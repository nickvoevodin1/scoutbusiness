  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

px) clamp(56px,8vw,96px)\">\n    <div style=\"position:absolute;top:-160px;right:-120px;width:640px;height:640px;background:radial-gradient(circle at center,rgba(20,21,213,.5),rgba(20,21,213,0) 62%);pointer-events:none\"><\u002Fdiv>\n    <div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:64px 64px;-webkit-mask-image:radial-gradient(circle at 30% 20%,#000,transparent 75%);mask-image:radial-gradient(circle at 30% 20%,#000,transparent 75%);pointer-events:none\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:1120px;margin:0 auto;display:flex;flex-wrap:wrap;gap:clamp(32px,5vw,64px);align-items:center\">\n      <div class=\"reveal\" style=\"flex:1 1 440px;min-width:300px\">\n        <div style=\"display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#6E6EF7;border:1px solid rgba(110,110,247,.35);border-radius:999px;padding:7px 14px;margin-bottom:26px\">Ежедневный разбор в Telegram<\u002Fdiv>\n        <h1 id=\"h-hero\" style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(2.1rem,5.4vw,3.55rem);line-height:1.04;letter-spacing:.004em;text-transform:uppercase;color:#F4F4F5;margin:0 0 22px\">Каждый день — одна готовая бизнес-возможность с цифрами и планом запуска<\u002Fh1>\n        <p style=\"font-family:'Golos Text',sans-serif;font-size:clamp(15px,1.5vw,18px);line-height:1.6;color:#9A9A9D;max-width:56ch;margin:0 0 34px\">Разбор одного растущего стартапа приходит вам в Telegram каждое утро: что это, как зарабатывает, можно ли повторить в России и сколько на это нужно денег.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:22px\">\n          <a href=\"#join\" data-cta=\"lp_hero\" style=\"display:inline-block;padding:18px 40px;background:#1415D5;color:#fff;border-radius:999px;font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;letter-spacing:.09em;text-transform:uppercase;box-shadow:0 0 60px rgba(20,21,213,.5);transition:transform .12s ease,background-color .12s ease\" style-hover=\"background:#2E2FEA;transform:scale(1.02)\" style-active=\"transform:scale(.99)\">Читать первый выпуск<\u002Fa>\n          <div style=\"display:flex;align-items:center;gap:10px;color:#9A9A9D;font-size:14px\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;color:#F4F4F5;font-size:15px\">47<\u002Fspan> выпусков подряд, без единого пропуска\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"flex:0 0 auto;margin:0 auto;position:relative\">\n        <div style=\"width:300px;height:600px;background:#0c0c10;border:1px solid rgba(255,255,255,.12);border-radius:44px;padding:13px;box-shadow:0 50px 130px rgba(20,21,213,.3),0 0 0 1px rgba(255,255,255,.04)\">\n          <div style=\"height:100%;border-radius:32px;background:#121216;overflow:hidden;display:flex;flex-direction:column\">\n            <div style=\"display:flex;align-items:center;gap:10px;padding:16px 16px 14px;border-bottom:1px solid rgba(255,255,255,.06)\">\n              <div style=\"width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1415D5,#4a4bf0);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;color:#fff;font-size:15px;font-weight:700\">Р<\u002Fdiv>\n              <div>\n                <div style=\"color:#F4F4F5;font-size:13px;font-weight:600\">Бизнес-разведка<\u002Fdiv>\n                <div style=\"color:#6E6EF7;font-size:11px;font-family:'IBM Plex Mono',monospace\">бот · онлайн<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;padding:16px;display:flex;flex-direction:column;gap:12px\">\n              <div style=\"align-self:flex-start;max-width:88%;background:#1c1c22;border-radius:4px 16px 16px 16px;padding:12px 13px\">\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;color:#6E6EF7;text-transform:uppercase;margin-bottom:8px\">Выпуск № 47 · 08:00<\u002Fdiv>\n                <div style=\"height:9px;border-radius:4px;background:rgba(255,255,255,.13);margin-bottom:7px\"><\u002Fdiv>\n                <div style=\"height:9px;width:82%;border-radius:4px;background:rgba(255,255,255,.1);margin-bottom:7px\"><\u002Fdiv>\n                <div style=\"height:9px;width:60%;border-radius:4px;background:rgba(255,255,255,.08)\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"align-self:flex-start;width:70%;background:repeating-linear-gradient(45deg,#16161b,#16161b 9px,#1b1b21 9px,#1b1b21 18px);border:1px solid rgba(255,255,255,.08);border-radius:4px 16px 16px 16px;height:96px;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px\">\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;line-height:1.5;color:#7b7b82\">сюда — реальный<br>скриншот выпуска<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"align-self:flex-start;max-width:80%;background:#1c1c22;border-radius:4px 16px 16px 16px;padding:11px 13px\">\n                <div style=\"height:9px;width:90%;border-radius:4px;background:rgba(255,255,255,.1);margin-bottom:7px\"><\u002Fdiv>\n                <div style=\"height:9px;width:55%;border-radius:4px;background:rgba(255,255,255,.08)\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px\">\n              <div style=\"flex:1;height:34px;border-radius:999px;background:#1c1c22\"><\u002Fdiv>\n              <div style=\"width:34px;height:34px;border-radius:50%;background:#1415D5\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STATS STRIP -->\n  <sc-if value=\"{{ showStats }}\" hint-placeholder-val=\"{{ true }}\">\n  <section aria-label=\"Ключевые факты\" style=\"border-top:1px solid rgba(255,255,255,.07);border-bottom:1px solid rgba(255,255,255,.07);background:#0b0b0e\">\n    <div class=\"reveal\" style=\"max-width:1120px;margin:0 auto;padding:clamp(28px,4vw,40px) clamp(18px,4vw,32px);display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr))\">\n      <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"padding:8px clamp(14px,2vw,26px);border-left:1px solid rgba(255,255,255,.08)\">\n          <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(1.9rem,3.2vw,2.4rem);color:#F4F4F5;letter-spacing:.01em\">{{ s.v }}<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:#9A9A9D;margin-top:4px\">{{ s.l }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- АНАТОМИЯ ВЫПУСКА -->\n  <section data-screen-label=\"Анатомия выпуска\" aria-labelledby=\"h-anat\" style=\"padding:clamp(64px,9vw,112px) clamp(18px,4vw,32px)\">\n    <div style=\"max-width:1120px;margin:0 auto\">\n      <div class=\"reveal\" style=\"max-width:60ch;margin-bottom:clamp(36px,5vw,56px)\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#6E6EF7;margin-bottom:16px\">— Анатомия выпуска<\u002Fdiv>\n        <h2 id=\"h-anat\" style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(1.7rem,3.8vw,2.6rem);line-height:1.05;text-transform:uppercase;color:#F4F4F5;margin:0 0 16px\">Вы получаете не заметку, а разбор по семи пунктам<\u002Fh2>\n        <p style=\"font-size:clamp(15px,1.4vw,17px);line-height:1.6;margin:0\">Каждый выпуск устроен одинаково и предсказуемо. Одна структура — от «что это» до сметы запуска.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px\">\n        <sc-for list=\"{{ anatomy }}\" as=\"a\" hint-placeholder-count=\"7\">\n          <div class=\"reveal\" style=\"background:#131317;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:26px 24px 28px;transition:border-color .2s,transform .2s\" style-hover=\"border-color:rgba(110,110,247,.45);transform:translateY(-4px)\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:#1415D5;letter-spacing:.1em\">{{ a.n }}<\u002Fdiv>\n            <h3 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:19px;text-transform:uppercase;letter-spacing:.02em;color:#F4F4F5;margin:14px 0 8px\">{{ a.t }}<\u002Fh3>\n            <p style=\"font-size:14.5px;line-height:1.55;margin:0;color:#9A9A9D\">{{ a.d }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ПРИМЕР ВЫПУСКА -->\n  <section data-screen-label=\"Пример выпуска\" aria-labelledby=\"h-ex\" style=\"padding:clamp(64px,9vw,112px) clamp(18px,4vw,32px);background:#0b0b0e;border-top:1px solid rgba(255,255,255,.07);border-bottom:1px solid rgba(255,255,255,.07)\">\n    <div style=\"max-width:1120px;margin:0 auto\">\n      <div class=\"reveal\" style=\"text-align:center;max-width:60ch;margin:0 auto clamp(36px,5vw,52px)\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#6E6EF7;margin-bottom:16px\">— Пример выпуска<\u002Fdiv>\n        <h2 id=\"h-ex\" style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(1.7rem,3.8vw,2.6rem);line-height:1.05;text-transform:uppercase;color:#F4F4F5;margin:0 0 14px\">Вот полный вчерашний выпуск. Целиком. Судите сами<\u002Fh2>\n        <p style=\"font-size:clamp(15px,1.4vw,17px);line-height:1.6;margin:0\">Без сокращений и без «воды» — с конкретными цифрами по рынку, выручке и смете MVP.<\u002Fp>\n      <\u002Fdiv>\n\n      <article class=\"reveal\" style=\"max-width:70ch;margin:0 auto;background:#111116;border:1px solid rgba(255,255,255,.1);border-radius:20px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.5)\">\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;padding:20px clamp(22px,4vw,36px);border-bottom:1px solid rgba(255,255,255,.08);background:#131319\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.08em;color:#9A9A9D\">Выпуск № 47 · 8 июля 2026<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6E6EF7;border:1px solid rgba(110,110,247,.4);border-radius:999px;padding:5px 12px\">Полный выпуск<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:clamp(24px,4vw,42px)\">\n          <p style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:clamp(1.35rem,2.6vw,1.8rem);line-height:1.15;text-transform:uppercase;color:#F4F4F5;margin:0 0 28px\">StashRoom — self-storage без единого склада<\u002Fp>\n\n          <h3 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:.05em;text-transform:uppercase;color:#6E6EF7;margin:0 0 8px\">01 · Стартап<\u002Fh3>\n          <p style=\"font-size:16px;line-height:1.65;color:#c9c9cd;margin:0 0 24px\">Маркетплейс, который сдаёт в аренду не свои склады, а свободные метры у обычных людей: гаражи, кладовки, пустые комнаты. Компания ничего не строит и берёт комиссию с каждой сделки.<\u002Fp>\n\n          <h3 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:.05em;text-transform:uppercase;color:#6E6EF7;margin:0 0 8px\">02 · Почему растёт<\u002Fh3>\n          <p style=\"font-size:16px;line-height:1.65;color:#c9c9cd;margin:0 0 24px\">Классический self-storage требует земли и стройки — от <span style=\"font-family:'IBM Plex Mono',monospace;color:#F4F4F5\">$1,5 млн<\u002Fspan> за объект. StashRoom обходит capex целиком: предложение уже существует, его надо только оцифровать. За 2025 год выручка выросла на <span style=\"font-family:'IBM Plex Mono',monospace;color:#F4F4F5\">140%<\u002Fspan> год к году.<\u002Fp>\n\n          <h3 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:.05em;text-transform:uppercase;color:#6E6EF7;margin:0 0 8px\">03 · Как зарабатывает<\u002Fh3>\n          <p style=\"font-size:16px;line-height:1.65;color:#c9c9cd;margin:0 0 24px\">Комиссия <span style=\"font-family:'IBM Plex Mono',monospace;color:#F4F4F5\">25%<\u002Fspan> с каждого платежа арендатора плюс платная страховка хранения. Средний чек — <span style=\"font-family:'IBM Plex Mono',monospace;color:#F4F4F5\">$95/мес<\u002Fspan>, из них компании остаётся около <span style=\"font-family:'IBM Plex Mono',monospace;color:#F4F4F5\">$28<\u002Fspan>.<\u002Fp>\n\n          <h3 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:.05em;text-transform:uppercase;color:#6E6EF7;margin:0 0 8px\">04 · Применимость в РФ<\u002Fh3>\n          <p style=\"font-size:16px;line-height:1.65;color:#c9c9cd;margin:0 0 24px\">Заходит: в крупных городах дефицит дешёвого хранения острее, чем в США, а гаражных кооперативов — миллионы. Главный барьер — доверие к хранению у незнакомца; решается депозитом и страховкой.<\u002Fp>\n\n          <h3 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:.05em;text-transform:uppercase;color:#6E6EF7;margin:0 0 8px\">05 · Размер рынка<\u002Fh3>\n          <p style=\"font-size:16px;line-height:1.65;color:#c9c9cd;margin:0 0 24px\">Мировой self-storage — <span style=\"font-family:'IBM Plex Mono',monospace;color:#F4F4F5\">$58 млрд<\u002Fspan>. Российский организованный рынок хранения — около <span style=\"font-family:'IBM Plex Mono',monospace;color:#F4F4F5\">24 млрд ₽<\u002Fspan> и растёт на <span style=\"font-family:'IBM Plex Mono',monospace;color:#F4F4F5\">15–20%<\u002Fspan> в год. P2P-сегмент почти пуст.<\u002Fp>\n\n          <h3 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:.05em;text-transform:uppercase;color:#6E6EF7;margin:0 0 8px\">06 · MVP за месяц<\u002Fh3>\n          <p style=\"font-size:16px;line-height:1.65;color:#c9c9cd;margin:0 0 24px\">Telegram-бот, таблица и ручная модерация. Ни склада, ни приложения: сводите тех, кому негде хранить, с теми, у кого есть метры. Проверяете, платят ли, до первой строчки кода.<\u002Fp>\n\n          <h3 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:.05em;text-transform:uppercase;color:#6E6EF7;margin:0 0 10px\">07 · Бюджет и план запуска<\u002Fh3>\n          <div style=\"border:1px solid rgba(255,255,255,.09);border-radius:12px;overflow:hidden;margin:0 0 8px\">\n            <div style=\"display:flex;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.07);font-size:15px\"><span style=\"color:#9A9A9D\">Лендинг и бот<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;color:#F4F4F5\">60 000 ₽<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.07);font-size:15px\"><span style=\"color:#9A9A9D\">Страховой депозитный фонд<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;color:#F4F4F5\">150 000 ₽<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.07);font-size:15px\"><span style=\"color:#9A9A9D\">Трафик на первую сотню лидов<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;color:#F4F4F5\">90 000 ₽<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;padding:14px 16px;background:rgba(20,21,213,.14);font-size:15px\"><span style=\"color:#F4F4F5;font-weight:600\">Итого на проверяемый MVP<\u002Fspan><span style=\"font-fa -dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;showStats&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Секции&quot;},&quot;openFirstFaq&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Поведение&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      showStats: this.props.showStats !== false,\n      stats: [\n        { v: '47', l: 'выпусков подряд' },\n        { v: '08:00', l: 'выход каждый день' },\n        { v: '6–8 мин', l: 'на чтение' },\n        { v: '250 ₽', l: 'в месяц' }\n      ],\n      anatomy: [\n        { n: '01', t: 'Стартап', d: 'Что за компания и что именно она делает.' },\n        { n: '02', t: 'Почему растёт', d: 'Тренд и драйверы, которые тянут спрос вверх.' },\n        { n: '03', t: 'Как зарабатывает', d: 'Модель монетизации в одну понятную схему.' },\n        { n: '04', t: 'Применимость в РФ', d: 'Заходит идея на нашем рынке или нет.' },\n        { n: '05', t: 'Размер рынка', d: 'Объём и динамика — в конкретных цифрах.' },\n        { n: '06', t: 'MVP за месяц', d: 'Что собрать, чтобы проверить гипотезу.' },\n        { n: '07', t: 'Бюджет и план', d: 'Смета запуска и первые шаги по датам.' }\n      ],\n      businesses: [\n        { name: 'Кофейня «to go» у выхода метро', invest: '1 800 000 ₽', payback: '14 мес', verdictLabel: 'ЗАХОДИТЬ С ОГОВОРКАМИ', verdictColor: '#E0B45F', note: 'Решает только трафик точки: второй ряд от метро убивает экономику.' },\n        { name: 'Автомойка самообслуживания', invest: '6 500 000 ₽', payback: '31 мес', verdictLabel: 'НЕ ЗАХОДИТЬ', verdictColor: '#E5484D', note: 'Рынок перегрет, сроки окупаемости растянулись, сети демпингуют.' },\n        { name: 'Пункт выдачи заказов', invest: '700 000 ₽', payback: '11 мес', verdictLabel: 'ЗАХОДИТЬ', verdictColor: '#5FD08A', note: 'Низкий порог входа, но и потолок дохода тоже низкий.' },\n        { name: 'Шаурма у транспортного узла', invest: '1 200 000 ₽', payback: '9 мес', verdictLabel: 'ЗАХОДИТЬ', verdictColor: '#5FD08A', note: 'Лучшая юнит-экономика в подборке при живом пешем трафике.' }\n      ],\n      suits: [\n        'У вас уже есть капитал от 300 000 ₽ и нет идеи, куда его вложить.',\n        'Вы действующий предприниматель и ищете второе направление.',\n        'Вы готовы проверять гипотезы руками, а не только читать про них.'\n      ],\n      notSuits: [\n        'Вы ищете, как заработать без вложений и без риска.',\n        'Вам нужна гарантия дохода и «бизнес под ключ».',\n        'Вы не готовы тратить 6–8 минут в день на чтение.'\n      ],\n      formatItems: [\n        { v: '08:00', l: 'Один выпуск каждое утро по московскому времени.' },\n        { v: '6–8 мин', l: 'Столько занимает чтение одного разбора.' },\n        { v: 'Архив', l: 'Все прошлые выпуски доступны внутри бота.' },\n        { v: '1 клик', l: 'Отписка в любой момент, без разговоров с поддержкой.' }\n      ],\n      faq: [\n        { q: 'Чем это отличается от бесплатных каналов про бизнес?', a: 'Бесплатные каналы пересказывают новости. Здесь каждый выпуск — разбор по одной жёсткой структуре из семи пунктов с реальными цифрами и сметой. Не «смотрите, какой стартап», а «вот сколько стоит повторить и стоит ли вообще».' },\n        { q: 'А если идея не подойдёт под мой город?', a: 'Поэтому в каждом выпуске есть отдельный пункт «применимость в РФ», а раз в неделю — разбор именно российского бизнеса с местной юнит-экономикой. Плюс архив: вы ищете по нише, а не ждёте нужный выпуск.' },\n        { q: 'Кто автор и откуда данные?', a: 'Разборы готовит команда с опытом запуска и инвестиций. Источники цифр — открытые отчёты компаний, отраслевые исследования и прямые расчёты юнит-экономики. В каждом выпуске видно, откуда взята цифра.' },\n        { q: 'Как отменить подписку?', a: 'В один клик внутри бота командой /stop. Без писем в поддержку и «поговорите с менеджером». Доступ сохраняется до конца оплаченного месяца.' },\n        { q: 'Вернёте ли деньги?', a: 'Да. Если после первого оплаченного месяца скажете, что не зашло, — вернём полную сумму за этот месяц. Одна кнопка в боте, без объяснения причин.' },\n        { q: 'Нужен ли опыт в бизнесе?', a: 'Нет. Выпуски написаны так, что понятны и без опыта, но полезны и практикующему. Порог — не знания, а капитал от 300 000 ₽ и готовность проверять идеи.' }\n      ]\n    };\n  }\n\n  componentDidMount() {\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    // Sticky header state\n    const header = document.querySelector('[data-role=\"header\"]');\n    const onScroll = () => {\n      if (!header) return;\n      if (window.scrollY > 40) {\n        header.style.backgroundColor = 'rgba(9,9,11,.92)';\n        header.style.borderBottomColor = 'rgba(255,255,255,.08)';\n      } else {\n        header.style.backgroundColor = 'rgba(9,9,11,.72)';\n        header.style.borderBottomColor = 'rgba(255,255,255,0)';\n      }\n    };\n    window.addEventListener('scroll', onScroll, { passive: true });\n    onScroll();\n\n    // Scroll reveal (IntersectionObserver), with stagger inside grids\n    const reveals = Array.from(document.querySelectorAll('.reveal'));\n    const revealNow = (el) => {\n      const siblings = Array.from(el.parentElement.children).filter(c => c.classList.contains('reveal'));\n      const idx = Math.min(Math.max(siblings.indexOf(el), 0), 5);\n      el.style.transitionDelay = (idx > 0 ? idx * 45 : 0) + 'ms';\n      el.classList.add('in');\n    };\n    if (reduce || !('IntersectionObserver' in window)) {\n      reveals.forEach(el => el.classList.add('in'));\n    } else {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach(entry => {\n          if (!entry.isIntersecting) return;\n          revealNow(entry.target);\n          io.unobserve(entry.target);\n        });\n      }, { threshold: 0.15 });\n      reveals.forEach(el => io.observe(el));\n      // First pass: reveal anything already in view at load (IO may not fire in some envs)\n      const revealVisible = () => {\n        reveals.forEach(el => {\n          if (el.classList.contains('in')) return;\n          const r = el.getBoundingClientRect();\n          if (r.top < window.innerHeight * 0.95 && r.bottom > 0) { revealNow(el); io.unobserve(el); }\n        });\n      };\n      revealVisible();\n      window.addEventListener('scroll', revealVisible, { passive: true });\n      window.addEventListener('load', revealVisible);\n      // Safety backstop: never leave content invisible\n      setTimeout(() => { reveals.forEach(el => { if (!el.classList.contains('in')) { el.classList.add('in'); } }); }, 1400);\n    }\n\n    // FAQ accordion (single-open), driven directly on the DOM — no re-render\n    const items = Array.from(document.querySelectorAll('[data-faq-item]'));\n    const closeAll = (except) => {\n      items.forEach(it => {\n        if (it === except) return;\n        const b = it.querySelector('[data-faq]');\n        const p = it.querySelector('[data-faq-panel]');\n        const ic = it.querySelector('[data-faq-icon]');\n        if (b) b.setAttribute('aria-expanded', 'false');\n        if (p) p.classList.remove('open');\n        if (ic) ic.style.transform = 'rotate(0deg)';\n        it.style.borderColor = 'rgba(255,255,255,.08)';\n      });\n    };\n    items.forEach(it => {\n      const btn = it.querySelector('[data-faq]');\n      const panel = it.querySelector('[data-faq-panel]');\n      const icon = it.querySelector('[data-faq-icon]');\n      if (!btn || !panel) return;\n      btn.addEventListener('click', () => {\n        const open = panel.classList.contains('open');\n        if (open) {\n          panel.classList.remove('open');\n          btn.setAttribute('aria-expanded', 'false');\n          if (icon) icon.style.transform = 'rotate(0deg)';\n          it.style.borderColor = 'rgba(255,255,255,.08)';\n        } else {\n          closeAll(it);\n          panel.classList.add('open');\n          btn.setAttribute('aria-expanded', 'true');\n          if (icon) icon.style.transform = 'rotate(45deg)';\n          it.style.borderColor = 'rgba(110,110,247,.4)';\n        }\n      });\n    });\n\n    if (this.props.openFirstFaq && items[0]) {\n      const b = items[0].querySelector('[data-faq]');\n      if (b) b.click();\n    }\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
